version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: nestop
    binary: nestop
    main: ./main.go
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildTime={{.Date}}

archives:
  - id: nestop
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: harshpatel5940
    name: nestop
  draft: false
  prerelease: true
  name_template: "{{.ProjectName}} v{{.Version}} (pre-release)"
  header: |
    ## 🪺 nestop v{{.Version}} (pre-release)

    **Scaffold NestJS projects interactively from the terminal.**

    ### 🚀 Install (one-liner)

    ```bash
    curl -fsSL https://raw.githubusercontent.com/harshpatel5940/nestop/main/install.sh | bash
    ```

    ### 📦 Manual download

    Grab the binary for your OS/arch below.

    **Go:**
    ```bash
    go install github.com/harshpatel5940/nestop@{{.Tag}}
    ```

    ### ⚡ Usage

    ```bash
    nestop
    ```

  footer: |
    ---
    **Full Changelog**: https://github.com/harshpatel5940/nestop/compare/{{.PreviousTag}}...{{.Tag}}
